<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeMemes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --card2: #222222;
            --border: rgba(255,255,255,0.08);
            --accent: #6c63ff;
            --accent2: #8b5cf6;
            --text: #f0f0f0;
            --text2: #999;
            --text3: #666;
            --green: #22c55e;
            --yellow: #f59e0b;
            --red: #ef4444;
            --nav-h: 65px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-bottom: var(--nav-h);
        }

        /* ── HEADER ── */
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span { color: var(--accent); }

        .header-badge {
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── PAGES ── */
        .page { display: none; }
        .page.active { display: block; }

        /* ── FEED ── */
        .feed {
            max-width: 560px;
            margin: 0 auto;
            padding: 16px 14px;
        }

        /* ── STATS ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }

        .stat-num {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text3);
            margin-top: 3px;
            font-weight: 500;
        }

        /* ── MEME CARD ── */
        .meme-card {
            background: var(--card);
            border-radius: 18px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .card-header {
            padding: 13px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-num {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .card-sub {
            font-size: 11px;
            color: var(--text3);
            margin-top: 1px;
        }

        .diff-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .diff-easy {
            background: rgba(34,197,94,0.12);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.2);
        }

        .diff-medium {
            background: rgba(245,158,11,0.12);
            color: var(--yellow);
            border: 1px solid rgba(245,158,11,0.2);
        }

        .diff-hard {
            background: rgba(239,68,68,0.12);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.2);
        }

        /* Текст мема */
        .meme-text {
            padding: 16px;
            font-size: 15px;
            line-height: 1.75;
            color: var(--text);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            background: var(--card2);
        }

        /* Картинка */
        .meme-img-wrap { position: relative; background: #111; }

        .meme-img {
    width: 100%;
    height: auto;        /* высота сама подстраивается под фото */
    display: block;
    background: #111;
}

        .img-error {
            display: none;
            width: 100%;
            padding: 40px 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--card2);
            text-align: center;
        }

        .img-error.show { display: flex; }

        .img-error p {
            color: var(--text2);
            font-size: 14px;
            font-weight: 500;
        }

        .img-error small {
            color: var(--text3);
            font-size: 12px;
        }

        .vpn-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--red);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Перевод */
        .translation-block {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .trans-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(108,99,255,0.15);
            border: 1px solid rgba(108,99,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .trans-content {}

        .trans-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .trans-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.65;
            font-weight: 400;
        }

        .trans-text.loading {
            color: var(--text3);
            font-style: italic;
        }

        /* Слова */
        .words-section {}

        .words-toggle {
            width: 100%;
            padding: 13px 16px;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid transparent;
            transition: background 0.2s;
        }

        .words-toggle:hover { background: rgba(255,255,255,0.03); }

        .words-toggle.open {
            border-bottom-color: var(--border);
        }

        .toggle-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .words-pill {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .chevron {
            transition: transform 0.3s;
            color: var(--text3);
        }

        .chevron.open { transform: rotate(180deg); }

        .words-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .words-body.open { max-height: 2000px; }

        .word-row {
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .word-row:last-child { border-bottom: none; }

        .word-info { flex: 1; }

        .word-en {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }

        .word-ru {
            font-size: 12px;
            color: var(--text2);
        }

        .add-word-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            color: var(--text3);
        }

        .add-word-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(108,99,255,0.1);
        }

        .add-word-btn.added {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.3);
            color: var(--green);
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            color: var(--text3);
            font-size: 11px;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }

        .nav-item.active { color: var(--accent); }

        .nav-item svg { transition: color 0.2s; }

        .nav-badge {
            position: absolute;
            top: 8px;
            right: calc(50% - 18px);
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        /* ── WORDS PAGE ── */
        .words-page {
            max-width: 560px;
            margin: 0 auto;
            padding: 16px 14px;
        }

        .words-page-header {
            margin-bottom: 20px;
        }

        .words-page-header h2 {
            font-size: 22px;
            font-weight: 800;
        }

        .words-page-header p {
            color: var(--text3);
            font-size: 13px;
            margin-top: 4px;
        }

        .saved-word-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .sw-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(139,92,246,0.2));
            border: 1px solid rgba(108,99,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .sw-info { flex: 1; }

        .sw-en {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .sw-ru {
            font-size: 13px;
            color: var(--text2);
            margin-top: 2px;
        }

        .sw-remove {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            transition: all 0.2s;
        }

        .sw-remove:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(239,68,68,0.08);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state svg {
            color: var(--text3);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text3);
            font-size: 14px;
            line-height: 1.6;
        }

        /* toast */
        .toast {
            position: fixed;
            bottom: calc(var(--nav-h) + 16px);
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
        </div>
        <div class="logo-text">Be<span>Memes</span></div>
    </div>
    <div class="header-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
        </svg>
        <span id="header-count">0 мемов</span>
    </div>
</header>

<!-- PAGE: МЕМЫ -->
<div class="page active" id="page-memes">
    <div class="feed">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-num" id="stat-viewed">0</div>
                <div class="stat-label">Просмотрено</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-words">0</div>
                <div class="stat-label">Слов изучено</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-saved">0</div>
                <div class="stat-label">Сохранено</div>
            </div>
        </div>

        <div id="feed-container"></div>

    </div>
</div>

<!-- PAGE: СЛОВА -->
<div class="page" id="page-words">
    <div class="words-page">
        <div class="words-page-header">
            <h2>Мои слова</h2>
            <p>Слова которые ты добавил для изучения</p>
        </div>
        <div id="saved-words-list">
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <h3>Пока пусто</h3>
                <p>Добавляй слова из мемов<br>нажимая на кнопку + рядом со словом</p>
            </div>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="nav-item active" id="nav-memes" onclick="switchPage('memes')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Мемы
    </button>
    <button class="nav-item" id="nav-words" onclick="switchPage('words')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        Слова
        <span class="nav-badge" id="words-badge" style="display:none">0</span>
    </button>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="memes.js"></script>
<script>// ── STATE ──
let currentIndex = 0;
const PER_PAGE = 4;
const savedWords = new Map();
let viewedCount = 0;
let totalWords = 0;
let isLoading = false;

// ── NAVIGATION ──
function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    document.getElementById(`nav-${page}`).classList.add('active');
    if (page === 'words') renderSavedWords();
}

// ── TOAST ──
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ── DIFFICULTY ──
function diffInfo(d) {
    return {
        easy:   { label: 'Начинающий', cls: 'diff-easy' },
        medium: { label: 'Средний',     cls: 'diff-medium' },
        hard:   { label: 'Продвинутый', cls: 'diff-hard' },
    }[d] || { label: 'Начинающий', cls: 'diff-easy' };
}

// ── WORD SAVE/REMOVE ──
function toggleWord(wordId, memeId) {
    const meme = MEMES_DB.find(m => m.id === memeId);
    const word = meme.words.find(w => w.id === wordId);
    const btn = document.getElementById(`wbtn-${wordId}`);

    if (savedWords.has(wordId)) {
        savedWords.delete(wordId);
        btn.classList.remove('added');
        btn.innerHTML = svgPlus();
        showToast('Слово удалено');
    } else {
        savedWords.set(wordId, word);
        btn.classList.add('added');
        btn.innerHTML = svgCheck();
        showToast(`"${word.en}" добавлено!`);
    }

    updateBadge();
    document.getElementById('stat-saved').textContent = savedWords.size;
}

function updateBadge() {
    const badge = document.getElementById('words-badge');
    if (savedWords.size > 0) {
        badge.style.display = 'flex';
        badge.textContent = savedWords.size;
    } else {
        badge.style.display = 'none';
    }
}

// ── SAVED WORDS PAGE ──
function renderSavedWords() {
    const container = document.getElementById('saved-words-list');

    if (savedWords.size === 0) {
        container.innerHTML = `
            <div class="empty-state">
                ${svgBookLarge()}
                <h3>Пока пусто</h3>
                <p>Добавляй слова из мемов<br>нажимая на кнопку + рядом со словом</p>
            </div>
        `;
        return;
    }

    container.innerHTML = '';
    savedWords.forEach((word, id) => {
        const card = document.createElement('div');
        card.className = 'saved-word-card';
        card.innerHTML = `
            <div class="sw-icon">${svgBook()}</div>
            <div class="sw-info">
                <div class="sw-en">${word.en}</div>
                <div class="sw-ru">${word.ru}</div>
            </div>
            <button class="sw-remove" onclick="removeWord('${id}')">
                ${svgTrash()}
            </button>
        `;
        container.appendChild(card);
    });
}

function removeWord(id) {
    savedWords.delete(id);
    const btn = document.getElementById(`wbtn-${id}`);
    if (btn) {
        btn.classList.remove('added');
        btn.innerHTML = svgPlus();
    }
    updateBadge();
    document.getElementById('stat-saved').textContent = savedWords.size;
    renderSavedWords();
    showToast('Слово удалено');
}

// ── CREATE CARD ── (убрали async!)
function createCard(meme) {
    const diff = diffInfo(meme.difficulty);
    const formattedText = meme.text.replace(/\n/g, '<br>');

    const card = document.createElement('div');
    card.className = 'meme-card';
    card.innerHTML = `
        <div class="card-header">
            <div class="card-header-left">
                <div>
                    <div class="card-num">Мем #${meme.id}</div>
                    <div class="card-sub">${meme.words.length} слов для изучения</div>
                </div>
            </div>
            <span class="diff-badge ${diff.cls}">${diff.label}</span>
        </div>

        <div class="meme-text">${formattedText}</div>

        <div class="meme-img-wrap">
            <img
                class="meme-img"
                src="${meme.image}"
                alt="meme"
                onerror="
                    this.style.display='none';
                    this.nextElementSibling.classList.add('show')
                "
            >
            <div class="img-error">
                ${svgWifi()}
                <p>Не удалось загрузить картинку</p>
                <div class="vpn-badge">
                    ${svgLock()}
                    Включите VPN
                </div>
                <small>Картинки могут долго загружаться</small>
            </div>
        </div>

        <div class="translation-block">
            <div class="trans-icon">${svgTranslate()}</div>
            <div class="trans-content">
                <div class="trans-label">Перевод</div>
                <div class="trans-text">${meme.translation}</div>
            </div>
        </div>

        <div class="words-section">
            <button class="words-toggle" id="wtoggle-${meme.id}" onclick="toggleWords(${meme.id})">
                <div class="toggle-left">
                    ${svgBook()}
                    <span>Слова из мема</span>
                    <span class="words-pill">${meme.words.length}</span>
                </div>
                <svg class="chevron" id="chev-${meme.id}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <div class="words-body" id="wbody-${meme.id}">
                ${meme.words.map(w => `
                    <div class="word-row">
                        <div class="word-info">
                            <div class="word-en">${w.en}</div>
                            <div class="word-ru">${w.ru}</div>
                        </div>
                        <button
                            class="add-word-btn ${savedWords.has(w.id) ? 'added' : ''}"
                            id="wbtn-${w.id}"
                            onclick="toggleWord('${w.id}', ${meme.id})"
                        >
                            ${savedWords.has(w.id) ? svgCheck() : svgPlus()}
                        </button>
                    </div>
                `).join('')}
            </div>
        </div>
    `;

    document.getElementById('feed-container').appendChild(card);

    // Статистика
    viewedCount++;
    totalWords += meme.words.length;
    document.getElementById('stat-viewed').textContent = viewedCount;
    document.getElementById('stat-words').textContent = totalWords;
    document.getElementById('header-count').textContent = `${MEMES_DB.length} мемов`;
}

function toggleWords(id) {
    document.getElementById(`wbody-${id}`).classList.toggle('open');
    document.getElementById(`chev-${id}`).classList.toggle('open');
    document.getElementById(`wtoggle-${id}`).classList.toggle('open');
}

// ── LOAD MORE ──
function loadMore() {
    if (isLoading) return;
    if (currentIndex >= MEMES_DB.length) return;

    isLoading = true;

    const end = Math.min(currentIndex + PER_PAGE, MEMES_DB.length);
    for (let i = currentIndex; i < end; i++) {
        createCard(MEMES_DB[i]);
    }
    currentIndex = end;
    isLoading = false;
}

// ── АВТОЗАГРУЗКА при скролле ──
function setupInfiniteScroll() {
    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    sentinel.style.height = '20px';
    document.getElementById('feed-container').after(sentinel);

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            if (currentIndex < MEMES_DB.length) {
                loadMore();
            } else {
                // Все мемы загружены
                sentinel.innerHTML = `
                    <p style="text-align:center; color:var(--text3); 
                    font-size:13px; padding: 10px 0 20px">
                        🎉 Все мемы загружены!
                    </p>
                `;
                observer.disconnect();
            }
        }
    }, {
        rootMargin: '200px' // начинаем грузить за 200px до конца
    });

    observer.observe(sentinel);
}

// ── SVG ICONS ──
function svgPlus() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
}

    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
}
function svgBook() {
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;
}
function svgBookLarge() {
    return `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;
}
function svgTrash() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
}
function svgTranslate() {
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>`;
}
function svgWifi() {
    return `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>`;
}
function svgLock() {
    return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
}

// ── СТАРТ ──
loadMore();
setupInfiniteScroll();
</script>
